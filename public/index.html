<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>test</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body,html{
  height:100%;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  color:#fff;
  background:#000;
  overflow:hidden;
}

.content{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

input{
  padding:15px;
  width:300px;
  border-radius:30px;
  border:none;
}
</style>
</head>

<body>

<div class="content">
  <h1>Science</h1>

  <form id="proxyForm">
    <input type="text" id="targetUrl" placeholder="URL または 検索" required>
  </form>
</div>

<script>
document.getElementById("proxyForm").addEventListener("submit", e => {
  e.preventDefault();

  let input = targetUrl.value.trim();
  if (!input) return;

  let url = input;

  if (!/^https?:\/\//i.test(input)) {
    if (input.includes('.') && !input.includes(' ')) {
      url = 'https://' + input;
    } else {
      url = 'https://www.bing.com/search?q=' + encodeURIComponent(input);
    }
  }

  location.href = "/proxy/" + encodeURIComponent(url);
});
</script>

</body>
</html>
